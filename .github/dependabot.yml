version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      fastapi:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn"
          - "pydantic*"
      stripe:
        patterns:
          - "stripe"
      mongo:
        patterns:
          - "motor"
          - "pymongo"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
      react-native:
        patterns:
          - "react"
          - "react-native"
          - "react-native-*"
          - "@react-native/*"
          - "@react-navigation/*"
      stripe:
        patterns:
          - "@stripe/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
