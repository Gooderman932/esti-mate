name: EAS Preview Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/eas-preview.yml'

jobs:
  preview:
    name: EAS preview build (Android APK)
    runs-on: ubuntu-latest
    if: ${{ secrets.EXPO_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Expo CLI + eas-cli
        run: npm i -g eas-cli @expo/cli
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build preview (Android)
        working-directory: frontend
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --profile preview --platform android --non-interactive --no-wait
